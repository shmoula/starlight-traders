<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A daily roguelike trade-run. Buy low, sell high, and survive a faucet/sink economy — new seed every day, same map for everyone."
    />
    <title>Starlight Traders</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load web fonts without blocking first paint: fetch as a non-applied
         stylesheet, then flip media to 'all' once it arrives. display=swap keeps
         text visible in the fallback face meanwhile; <noscript> covers no-JS. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&family=Orbitron:wght@500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&family=Orbitron:wght@500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link rel="stylesheet" href="/src/ui/styles.css" />
  </head>
  <body class="st-app-bg">
    <div id="backdrop" aria-hidden="true"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
